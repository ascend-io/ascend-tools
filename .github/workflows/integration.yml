name: Integration

on:
  workflow_call:
    secrets:
      ASCEND_SERVICE_ACCOUNT_ID:
        required: true
      ASCEND_SERVICE_ACCOUNT_KEY:
        required: true
      ASCEND_INSTANCE_API_URL:
        required: true

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/uv
            target
          key: integration-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'uv.lock') }}
          restore-keys: integration-${{ runner.os }}-
      - run: bin/setup
      - run: bin/build
      - name: CLI integration tests
        run: ./tests/integration.sh
        env:
          ASCEND_SERVICE_ACCOUNT_ID: ${{ secrets.ASCEND_SERVICE_ACCOUNT_ID }}
          ASCEND_SERVICE_ACCOUNT_KEY: ${{ secrets.ASCEND_SERVICE_ACCOUNT_KEY }}
          ASCEND_INSTANCE_API_URL: ${{ secrets.ASCEND_INSTANCE_API_URL }}
      - name: Python SDK integration tests
        run: ./tests/integration.py
        env:
          ASCEND_SERVICE_ACCOUNT_ID: ${{ secrets.ASCEND_SERVICE_ACCOUNT_ID }}
          ASCEND_SERVICE_ACCOUNT_KEY: ${{ secrets.ASCEND_SERVICE_ACCOUNT_KEY }}
          ASCEND_INSTANCE_API_URL: ${{ secrets.ASCEND_INSTANCE_API_URL }}
      - name: REST API integration tests
        run: ./tests/rest.py
        env:
          ASCEND_SERVICE_ACCOUNT_ID: ${{ secrets.ASCEND_SERVICE_ACCOUNT_ID }}
          ASCEND_SERVICE_ACCOUNT_KEY: ${{ secrets.ASCEND_SERVICE_ACCOUNT_KEY }}
          ASCEND_INSTANCE_API_URL: ${{ secrets.ASCEND_INSTANCE_API_URL }}
